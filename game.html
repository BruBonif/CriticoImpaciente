<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CriticoImpaciente — Reseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>if(localStorage.getItem('theme')!=='light')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body class="detail-page">

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="site-logo" aria-label="CriticoImpaciente inicio">
        <span class="logo-main">Critico</span><span class="logo-accent">Impaciente</span>
      </a>
      <a href="index.html" class="back-link" aria-label="Volver a todas las reseñas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="m15 18-6-6 6-6"/>
        </svg>
        Todas las reseñas
      </a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar modo de color">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="game-detail">
    <div class="loading-state" id="loading-state" aria-label="Cargando reseña">
      <div class="loading-spinner"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span class="footer-brand">CriticoImpaciente</span>
      <span class="footer-note">La opinión de un crítico sobre todo.</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
